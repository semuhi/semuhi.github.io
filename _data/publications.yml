- id: 54
  year: 2017
  month: 7  # Summer issue; month approximated for within-year sort
  title: "Review of False dawn: Protest, democracy, and violence in the new Middle East"
  venue: "Turkish Policy Quarterly"
  type: "essay"
  portfolio: ["durability"]
  tags: ["mena"]
  dataset: false
  featured: false
  # archive.org capture of the TPQ pdf
  url: "https://web.archive.org/web/20221006071557/http://turkishpolicy.com/files/articlepdf/book-review-false-dawn-protest-democracy-and-violence-in-the-new-middle-east_en_1847.pdf"
  blurb: ""
  abstract: >
    In False Dawn: Protest, Democracy, and Violence in the New Middle East, Steven A. Cook
    examines the trajectory of events in four countries (Turkey, Tunisia, Libya, and Egypt) to
    elucidate why the Middle Eastern uprisings failed and why they should not be construed as
    "revolutions." Cook argues that despite appearances, there were no true revolutions in the
    Middle East, since none of the affected societies underwent social revolutions and the old
    structures of power were never eliminated. He refers to identity crises and sticky
    institutions as the main reasons for the lack of structural change. The author also analyzes
    the role of US foreign policy and asserts that American influence is quite limited in the
    region. He therefore suggests that Washington can utilize development-based programs rather
    than governance programs to play the long game.
