# Model: type x portfolio[] x tags[] + dataset flag + related links + project refs.
# Portfolio keys: propaganda | business | durability | datahub | conflict | aitech. [] = wall-only.
# Region lives in tags (turkey, mena); no tag = cross-national/global.
