- id: 27
  year: 2025
  month: 9
  title: "Communicating strategic interests in humanitarian aid may help counter authoritarian propaganda and build trust in Europe"
  title_short: "Communicating strategic interests in humanitarian aid"
  venue: "IDOS Policy Brief 16/2025"
  kicker: "IDOS Policy brief"
  type: "policy-brief"
  portfolio: ["propaganda", "durability"]
  tags: ["dev-cooperation", "europe", "polarization"]
  dataset: false
  featured: false
  url: "https://doi.org/10.23661/ipb16.2025"
  related:
    - {id: 10, rel: "distills"}
  blurb: "How communicating the strategic interests behind aid can counter propaganda and build trust in Europe."
  abstract: >
    The way European donors talk about humanitarian aid matters as much as how they provide
    it. My experimental research in Turkey shows that transparent communication about the
    realpolitik behind humanitarian aid may help counter authoritarian propaganda in highly
    polarised middle-income countries with widespread anti-Western attitudes. My findings
    indicate that when donors openly acknowledge strategic motivations, propaganda messaging
    may lose its effectiveness among conservative, nationalist and Eurosceptic
    constituencies in recipient countries, whose attitudes are often hard to shift.
    Transparent communication may reduce conspiracism among this group, increase their trust
    in Europe and their support for international trade, while their support for the
    incumbent government may decline. Winning over these constituencies would be critical to
    democracy protection initiatives, as they often lend normative and systemic support to
    autocrats. However, donors must strike a careful balance and adopt a dual approach.
    While strategic messaging can persuade Eurosceptics, it may also alienate pro-EU,
    cosmopolitan citizens who value unconditional solidarity.

