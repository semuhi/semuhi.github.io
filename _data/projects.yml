# their portfolio pages and as ringed gold nodes in the network hero.
# `key` is what publications.yml / highlights.yml / social.yml reference via `project:`.
# net_x/net_y = node position in the 1200x640 network viewBox (from mockup A).

- key: demcor
  label: "#DEMCOR"
  title: "Corporate Civic Responsibility in Safeguarding Democracy"
  portfolio: "business"
  # extra portfolio chips on the map card only (primary stays `portfolio`)
  also: ["durability"]
  methods: ["exp", "text"]
  years: "2025-28"
  # host "IDOS" is dropped on the map card (user decision, round 8); the
  # portfolio-page lead card still shows it
  host: "IDOS"
  url: "https://www.idos-research.de/en/research/description/details/corporate-civic-responsibility-in-safeguarding-democracy-demcor/"
  net_x: 862
  net_y: 88
  # lead-card thumbnail on the portfolio page (square, shown left of the text)
  image: "/assets/img/post-capitalism.jpeg"
  # short version for the home-page network card only (the long blurb below
  # overflows the pinned-card frame); this is the pre-expansion blurb
  map_blurb: "Mapping pro-democracy business initiatives, what motivates firms to defend institutions, and AI-powered simulations for firms facing democratic erosion."
  blurb: >
    What moves private companies to safeguard democratic institutions and
    practices when they come under pressure? Where democracies erode, the
    private sector can act as a counterweight. Firms can sustain independent
    media, support civic participation, and lend their weight to electoral
    integrity. Yet we lack systematic evidence on when and why firms shift from
    acquiescence to engagement, especially during periods of heightened
    political risk stemming from democratic erosion and autocratization. The
    project aims to develop a comprehensive database of business-led
    pro-democracy initiatives and to assess the effectiveness of different cues
    and nudges in convincing firm managers to take pro-democracy action.

- key: depol-toolkit
  label: "Depolarization Toolkit"
  title: "Depolarization Toolkit: an agentic AI framework"
  portfolio: "aitech"
  years: "2026-28"
  host: "IDOS with UNDP + DW Akademie"
  url: "https://www.idos-research.de/en/research/description/details/depolarization-toolkit-an-agentic-ai-framework/"
  net_x: 820
  net_y: 552
  # lead-card thumbnail: post8-toolkit.jpeg title card padded to a square on its
  # own cream background (the lc-thumb slot is a 150x150 cover crop)
  image: "/assets/img/depol-title-sq.jpg"
  # short version for the home-page network card only (pre-expansion blurb)
  map_blurb: "A multi-agent AI assistant for practitioners designing depolarization programs."
  blurb: >
    In collaboration with Deutsche Welle (DW) Akademie and UNDP, we are
    developing an open, AI-powered assistant that supports development
    practitioners, consultants, and policy advisors in their programming,
    advisory, and policy-design work on mitigating political polarization.
    Rising polarization erodes institutional trust and, as the UNDP Human
    Development Report documents, slows progress across development goals. Yet
    the guidance practitioners rely on still lives in static, 100-page PDFs
    that are rarely updated, hard to navigate, and impossible to adapt to
    fast-moving, low-resource settings. Our tool replaces that model with a
    conversational interface: users describe their situation and receive
    context-specific guidance, a draft action plan, a risk assessment, and a
    stakeholder map, each grounded in vetted evidence. The tool builds on a
    multi-agent architecture: a retrieval agent runs optimized search; a
    context agent adapts outputs to the user's role, sector, and country; a
    scenario agent generates branching decision simulations; a
    structured-output agent drafts action plans and risk matrices; a
    quality-assurance agent fact-checks every output against the repository;
    and a translation agent delivers multilingual access. Each agent is
    independently testable and upgradable.

