    url: "https://www.linkedin.com/posts/semuhisinanoglu_can-we-track-autocratization-in-real-time-activity-7473328678664396800-nEFX"
    excerpt: "Can we track autocratization in real time, at low cost, and in a transparent and reproducible way? Last week, I was at the European University Institute in Florence for an incredible event organized by MetRiSP Standing Group of the Italian Political Science Association SISP on conceptualization and measurement challenges of democracy. I presented our ongoing work with Lucan Way, Steve Levitsky, and Yashar Talebirad. It's a framework for extracting structured autocratization events from sources. The most important contribution is that we implement this framework at low cost and at scale."
    portfolio: [datahub]
    project: datahub
    image: /assets/img/post5-eui.jpeg

