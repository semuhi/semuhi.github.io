photo: "/assets/img/prof_pic.jpg"
kicker: "Bio"
heading: "About me"

bio:
  - >-
    I’m a senior researcher at the <a href="https://www.idos-research.de/en/research-staff/sinanoglu-semuhi/">German
    Institute of Development and Sustainability (IDOS)</a>. I completed my
    <a href="https://tspace.library.utoronto.ca/handle/1807/140563">PhD in
    Political Science</a> at <a href="https://politics.utoronto.ca/">the University of
    Toronto</a>. I’m a <a href="https://www.gmfus.org/marshall-memorial-fellowship">German
    Marshall Fund Marshall Memorial Fellow (MMF) (2025)</a>.
  - >-
    At IDOS, I offer policy advice to German and international stakeholders on
    countering digital authoritarian propaganda, based on insights from my experimental
    and computational research within a
    <a href="https://www.idos-research.de/forschung/projekte/details/protecting-democracy-in-times-of-autocratization-and-polarization/">project
    team</a> analyzing global autocratization and polarization trends. I launched a new
    research-based policy initiative, called
    <a href="https://www.idos-research.de/forschung/projekte/details/corporate-civic-responsibility-in-safeguarding-democracy-demcor/">Corporate
    Civic Responsibility in Safeguarding Democracy (#DEMCOR)</a>, which aims to map
    global business initiatives for protecting democracy and, through experiments,
    identify what motivates firms to take action. In addition, I lead an initiative to
    reform programming, consulting, and capacity building in the development cooperation
    sector, using a
    <a href="https://www.idos-research.de/en/research/description/details/depolarization-toolkit-an-agentic-ai-framework/">multi-agentic
    AI architecture</a>.
  - >-
    I study how dictators drive support for their regimes through propaganda,
    repression, and polarization, and which counter-mobilization and international
    assistance strategies can mitigate their effectiveness. My
    <a href="https://utoronto.scholaris.ca/items/b539ae4b-e8a0-47e0-af47-d9e8bdf35822">dissertation
    research</a> is about how and why autocrats financially coerce their closest
    business allies during sovereign debt crises. I also contribute to the computational and experimental
    methodological tools in political science research. I am part of several novel data
    collection efforts, including developing
    <a href="https://www.researchgate.net/publication/400025334_Tracking_Democratic_Erosion_Transparently_and_Reproducibly_An_Event-Level_Dataset">measures
    of autocratization</a> and
    <a href="https://www.researchgate.net/publication/393329518_Domestic_leader_prosecutions_in_the_age_of_democratic_contestation_Introducing_the_PROSEC_Dataset_v10">leader
    prosecutions</a>. My co-authored papers are published in leading journals in our
    discipline, such as
    <a href="https://www.journalofdemocracy.org/articles/can-capitalism-save-democracy/">Journal
    of Democracy</a>, <a href="https://journals.sagepub.com/home/smr">Sociological
    Methods &amp; Research</a>,
    <a href="https://www.cambridge.org/core/journals/government-and-opposition">Government
    &amp; Opposition</a>, and <a href="https://jcp.gc.cuny.edu/">Comparative Politics</a>.
  - >-
    Previously, I was the co‑founder of a Toronto‑based political risk consultancy
    company, <a href="https://maidan.ca/">Maidan Analytics</a>, which leverages
    proprietary algorithms to forecast protests and elections. Before my doctoral
    studies, I worked as a social policy researcher at
    <a href="https://www.developmentanalytics.org">Development Analytics</a>, offering
    quantitative analysis support for reports delivered to international organizations.
  - >-
    I also co‑founded two social impact initiatives. One,
    <a href="https://web.archive.org/web/20200121082817/http://cityinclusive.ca/">CityInclusive</a>,
    based in Montreal advocated for social inclusion in the design of smart cities.
    The other,
    <a href="https://web.archive.org/web/20170312022329/http://co-opinion.org/">Co-Opinion
    Network</a>, based in Istanbul, mobilized more than 30 stakeholder organizations
    in six countries across the MENA region to foster inclusive economies in the
    region in the wake of the Fourth Industrial Revolution.
  - >-
    During my doctoral studies, I was a graduate associate at
    <a href="https://www.postcorlab.com/team-12">POSTCOR Lab</a>, a
    <a href="https://munkschool.utoronto.ca/trudeau-centre">Trudeau Centre Fellow</a> at
    the Munk School, a fellow at <a href="https://web.archive.org/web/20250419194114/https://jeannesauve.org/fellows/">Jeanne Sauvé
    Foundation</a>, and a Regional Manager at
    <a href="https://digitalsocietyproject.org/the-team/">Digital Society Project</a>.
    I’m a member of <a href="https://www.gif.org.tr/homepage">the Global Relations
    Forum</a>. I’m also an alum of <a href="https://www.masseycollege.ca/">Massey
    College</a>.
  - >-
    You may also find me occasionally singing at open mic events.

# "Launched" cards — initiatives, newest first. color = portfolio hue.
# desc allows inline HTML links; the include adds target=_blank to them.
launched:
  - label: "Data Infrastructure · 2026-29 · Bonn/Toronto"
    color: "var(--p-datahub)"
    title: "Autocracy Data Hub"
    # PROSEC charges->outcomes Sankey stands in for the hub (one of its
    # datasets); swap when a dedicated hub visual exists
    # DERTT heatmap grid, same visual as the portfolio lead card (2026-07-20;
    # replaced the PROSEC Sankey + its contain fit — the square crop can cover)
    img: "/assets/img/dertt-heatmap-sq.png"
    desc: "A sustainable dataset infrastructure for transparent, replicable, and low-cost measures of political regime dynamics. Ongoing collaboration with Lucan Way and Steve Levitsky."
    url: "/portfolios/datahub/"
  - label: "DEMCOR · 2025-28 · Bonn"
    color: "var(--p-business)"
    title: "Corporate Civic Responsibility in Safeguarding Democracy"
    img: "/assets/img/highlight-businesssupport.jpg"
    desc: "The project aims to develop a database of business-led pro-democracy initiatives and conduct experiments to assess which interventions are effective in convincing firm managers to support democracy."
    url: "https://www.idos-research.de/en/research/description/details/corporate-civic-responsibility-in-safeguarding-democracy-demcor/"
  - label: "Depolarization Toolkit · 2026-28 · Bonn"
    color: "var(--p-aitech)"
    title: "A multi-agentic AI framework for depolarization"
    img: "/assets/img/post8-toolkit.jpeg"
    fit: "contain"
    desc: "In collaboration with UNDP and DW Akademie, the project aims to develop an AI assistant with a multi-agent architecture for depolarization-related programming, consulting, capacity building, and training, targeting development practitioners, media professionals, and public communicators."
    url: "https://www.idos-research.de/en/research/description/details/depolarization-toolkit-an-agentic-ai-framework/"
  - label: "Political Risk Consultancy · 2019-24 · Toronto"
    color: "var(--p-datahub)"
    title: "Maidan Analytics"
    img: "/assets/img/maidan.png"
    fit: "contain"
    desc: "We offered risk consultancy built on two proprietary algorithms that predict protests and forecast elections in authoritarian regimes using open data and cutting-edge methodologies."
    url: "https://maidan.ca/products/"
  - label: "Social Impact · 2017-18 · Montreal"
    color: "var(--p-aitech)"
    title: "CityInclusive"
    img: "/assets/img/cityinclusive.jpg"
    desc: "Advocating for social inclusion in the design of smart cities, on our digital platform, we documented the work of Canadian cities as they went through the process of developing applications for the <a href=\"https://www.infrastructure.gc.ca/cities-villes/index-eng.html\">Smart Cities Challenge Canada</a>."
    url: "https://web.archive.org/web/20200121082817/http://cityinclusive.ca/"
  - label: "Social Impact · 2015-17 · Istanbul"
    color: "var(--p-durability)"
    title: "Co-Opinion Network"
    img: "/assets/img/coop.jpg"
    desc: "The network mobilized more than 30 stakeholders in six countries across the MENA region, built cross-sectoral collaboration for inclusive economies in the age of the Fourth Industrial Revolution, and organized summits and trainings in Belgium, Italy, Lebanon, Morocco, Tunisia, and Turkey."
    url: "https://web.archive.org/web/20170312022329/http://co-opinion.org/"

