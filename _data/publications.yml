- id: 36
  year: 2019
  month: 3
  title: "We need a new conservative party in Turkey for regime transition"
  venue: "Jerusalem Post"
  type: "oped"
  portfolio: ["durability"]
  tags: ["turkey", "defection"]
  dataset: false
  featured: false
  url: "https://www.jpost.com/Opinion/We-need-a-new-conservative-party-in-Turkey-for-regime-transition-585286"
  blurb: "A new conservative party in Turkey is needed, spearheaded by a pragmatic-centrist conservative leadership, to reclaim the center-right again."
  abstract: >
    The extant scholarship on regime transition suggests that the threat perception of the
    ruling elite coalition matters for successful and peaceful transitions. As cronies tied to
    the incumbent regime fear losing their entitlements, they mobilize around the regime to
    avoid such an outcome at any cost. The ruling elite coalition must therefore be convinced
    that they would be better off after a democratic transition, and they can only be convinced
    by people from similar conservative backgrounds. The current ruling coalition in Turkey is
    not as unified, consolidated, or bulletproof as it looks. That is just a mirage. There are
    disgruntled members within AKP cadres, together with growing dissent among AKP supporters.
    However, they are scattered and unable to resolve their collective action problems for fear
    of retaliation by the incumbent regime. A new conservative party is needed in Turkey,
    spearheaded by a pragmatic-centrist conservative leadership, to reclaim the center-right.

