    url: "https://www.linkedin.com/posts/semuhisinanoglu_govtech-initiatives-activity-7472555355185557505-ag5_"
    excerpt: "#Donors pour money into #GovTech expecting a #democratization dividend. #Autocrats are spending just as eagerly on the same tools. At least 88 authoritarian regimes currently run GovTech projects. Electoral autocracies alone receive 48.6% of GovTech aid commitments. Someone must be off the mark. In our recent policy brief, our experimental evidence with Armin von Schiller suggests that efficiency-enhancing GovTech does not just make services faster. When it is paired with sophisticated regime communication, it can durably entrench autocratic rule."
