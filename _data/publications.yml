- id: 18
  year: 2021
  month: 8
  title: "Divided at home, divided abroad? Affective polarization among migrants"
  venue: "File drawer"
  type: "academic-file-drawer"
  portfolio: ["conflict"]
  tags: ["polarization", "turkey"]
  methods: ["exp"]
  dataset: false
  featured: false
  coauthors: "Kepenek"
  coauthors_full: "Selin Kepenek"
  url: "https://www.researchgate.net/publication/354914015_Divided_at_Home_Divided_Abroad"
  blurb: "Whether home-country polarization travels abroad to shape migrants' tolerance and social ties."
  abstract: >
    How does polarization at home shape social network formation and political tolerance
    among immigrants? The existing scholarship suggests that networks with co-nationals in
    the country of destination can potentially provide a ‘haven’ for newcomers and
    facilitate their search for jobs, accommodation, and social connections. However, the
    impact of polarization in the home country on these everyday interactions between
    immigrants is understudied. We conducted two survey experiments in Turkey using a novel
    visual treatment of fake Facebook profiles, and replicated the designs in Canada. Our
    results indicate that home country polarization between regime supporters and opponents
    travels abroad. Under high polarization in the home country, anti-government immigrants
    are significantly less likely to help and socially engage with government-supporting
    co-nationals and tolerate political activities in the host country. However, despite
    high political polarization at home between anti-government groups, this divisiveness
    disappears abroad, as they are as likely to support, politically tolerate, and socially
    engage with each other. The findings offer insight into the mechanisms through which
    polarization at home can diffuse abroad and how contextual factors can mitigate
    affective polarization.

- id: 19
  year: 2026
  month: 6
  title: "Reality check on donor expectations: do GovTech initiatives help autocrats?"
  venue: "IDOS Policy Brief 17/2026"
  kicker: "IDOS Policy brief"
  type: "policy-brief"
  portfolio: ["propaganda", "durability", "aitech"]
  tags: ["turkey"]
  dataset: false
  featured: true
  coauthors: "von Schiller"
  coauthors_full: "Armin von Schiller"
  url: "https://doi.org/10.23661/ipb17.2026"
  # image: card thumbnail on the home Latest Publications strip (user-supplied 2026-07-19)
  image: "/assets/img/pub-realitycheck.png"
  related:
    - {id: 12, rel: "policy-brief version of"}
  blurb: "Efficiency-enhancing GovTech tools, when paired with sophisticated regime communication, can durably entrench autocratic rule."
  abstract: >
    International donors commit substantial resources to GovTech projects. World Bank
    GovTech investments alone have exceeded $118 billion over the last three decades. Donor
    strategy documents consistently frame digital transformation not only as a vehicle for
    improved effectiveness but also for strengthening democracy. Autocrats are equally
    invested in these tools. Globally, at least 88 authoritarian regimes currently operate
    GovTech projects, and electoral autocracies receive the largest share of GovTech aid
    (48.6 per cent of commitments). Beyond well-known surveillance applications, autocracies
    deploy GovTech for service delivery, grievance redress and even citizen engagement.
    These platforms are deployed to project an image of responsiveness and legitimacy. Our
    experimental evidence from Turkey shows how efficiency-enhancing GovTech tools, when
    paired with sophisticated regime communication, can durably entrench autocratic rule.
    Donors must take the second-order effects of GovTech initiatives seriously and develop
    mechanisms to carefully evaluate the risks of unintended consequences. Donors need to
    consider actively participating in public communication on these platforms, with visible
    donor branding, to counter government-controlled propaganda, claim credit for service
    delivery and strengthen trust in donor countries and organisations.

- id: 20
  year: 2026
  month: 4
  title: "The future of democracy promotion"
  # type stays book chapter (round-10 correction); venue "IDOS Report" fills the
  # right column on latest/wall/map (was the deduped "IDOS book chapter 04/2026")
  venue: "IDOS Report"
  type: "academic-chapter"
  portfolio: ["durability"]
  tags: ["dev-cooperation"]
  methods: ["qual"]
  dataset: false
  featured: false
  coauthors: "Leininger"
  coauthors_full: "Julia Leininger"
  url: "https://www.idos-research.de/en/publications/mitarbeiter-sonstige/article/the-future-of-democracy-promotion/"
  # sips-derived 960px copy of pub-promotion-elimende-inagella-...-unsplash.jpg (3.3MB original untracked)
  image: "/assets/img/pub-promotion.jpg"
  blurb: "Democracy promotion as we know it is likely dead."
  abstract: >
    Democracy promotion as we know it is likely finished. The global wave of autocratisation has
    fundamentally altered the landscape, rendering traditional approaches to democracy promotion
    largely ineffective and unsustainable. The logic of democracy promotion has reversed: during
    the Third Wave of Democratisation, the aim was to work with the tide of democratisation;
    today it works "against the tide" of autocratisation. That is why democracy aid should aim
    for protection instead of promotion. Despite evidence suggesting that democracy aid has
    worked against autocratisation, significant empirical gaps remain regarding which specific
    approaches are most effective. This effectiveness depends in part on how these strategies
    are publicly communicated. With the international institutional infrastructure for democracy
    aid crumbling, alternative conditionality mechanisms are required.

