# Social — curated post cards, never an auto feed (GAMEPLAN v3.2 §5).
# Rendered as the "Latest Posts" strip on the homepage (newest 6; user decision
# 2026-07-19) and in full on /activity/#posts (so EVERY entry here renders there).
# excerpt = the post's own opening words VERBATIM (no AI summaries,
# per user decision), clamped visually by CSS; the card links out to the post.
# Bluesky text fetched via the public API; LinkedIn text read from the public
# post pages. platform: bluesky | linkedin | x
# type: one per post, feeds the /activity/ Type chip filter (user classification
# 2026-07-19; same vocabulary as highlights.yml `kind`, plus post-only extras):
#   event       = participated / represented
#   talk        = delivered a talk at an event
#   media       = video interview or media appearance
#   publication = new publication of any kind (papers, datasets, op-eds)
#   news        = other news / announcements
#   reflection  = the user's own thoughts shared on social (not tied to an output)
# portfolio: a LIST of portfolio keys (a post can belong to several; user
# assignments 2026-07-19). Optional: project (key), item (publications.yml id),
# image (thumbnail path under /assets/img/), fit: contain (letterbox instead of crop).
# Cross-post rule (user, 2026-07-19): when a LinkedIn and a Bluesky post are near-
# duplicates, keep the LinkedIn version and drop the Bluesky twin.
# (Four twins purged 2026-07-19 when /activity/ began rendering the full list;
# the principled-pragmatism Bluesky twin of the MSC2026 LinkedIn post dropped
# the same day, and the sounding-board Bluesky twin was replaced by its
# LinkedIn original (Atlas of Innovation) when the 2024-25 backfill landed.)
# Dates for the 2024-25 backfill are decoded from the LinkedIn post IDs (UTC).

