- id: 1
  year: 2024
  month: 10
  title: "For better, for worse? Autocrats and their business allies during sovereign debt crises"
  venue: "University of Toronto"
  type: "academic-thesis"
  portfolio: ["business"]
  tags: ["turkey", "defection", "polarization"]
  methods: ["largen", "exp", "gametheory", "qual"]
  dataset: false
  featured: true
  url: "https://tspace.library.utoronto.ca/handle/1807/140563"
  blurb: "Why autocrats financially repress their closest business allies during sovereign debt crises, and why those allies rarely defect."
  abstract: >
    Why does an autocrat financially repress his closest business allies during an
    economic crisis? And why does the business elite rarely defect in the face of
    repression? On the one hand, the financial extortion of the wealthy businesspeople may provide a
    quick windfall for the regime to survive through a prolonged fiscal crisis. Indeed, the
    financial shakedown of businesses during economic downturns is quite common across
    different types of autocratic regimes. However, it is also risky: autocrats may damage
    their reputation in the international markets with coercive acts like expropriations.
    Violent repression of political insiders may also trigger collective elite dissent
    against the regime. Endowed with structural and disruptive power, the business elite may
    defect from the regime by mobilizing protests and funding the opposition. And yet,
    despite these inherent risks, dictators choose to financially extort or purge their
    business allies during economic crises. One might expect dictator’s business allies to
    defect from the regime in the face of financial repression. However, on average, they do
    not. The available data suggest that business opposition to autocratic regimes is a rare
    event. Why? In my dissertation, I argue that autocrats can financially coerce their
    business allies during sovereign debt crises with little political cost. They do so by
    relying on less intensive coercive tactics like tax audits. The co-opted business elite
    also presents a politically expedient target for repression. First, they can be
    incorporated into the support coalition in exchange for material benefits without
    institutional power-sharing concessions. That is why they are relatively easy targets
    for coercion and less likely to defect from the regime during major crises. Second, due
    to cronyism and corruption, they lack public support, and the dictator can easily
    mobilize public opinion to justify their repression and frame it as a crackdown on
    corruption. In other words, co-optation is a poisonous pill for businesses. The
    politically connected business elite become punching bags for the dictator during major
    crises without a credible threat of defection. Once co-opted, the cards get stacked
    against them, despite their structural power.

- id: 2
  year: 2025
  month: 8
  title: "Autocrats and their business allies: informal politics of defection and co-optation"
  venue: "Government and Opposition 60(4)"
  type: "academic-peer-review"
  portfolio: ["business", "propaganda"]
  tags: ["defection"]
  methods: ["largen", "gametheory"]
  dataset: false
  featured: true
  url: "https://doi.org/10.1017/gov.2025.10021"
  related:
    - {id: 1, rel: "grows out of the dissertation"}
  blurb: "Even without power-sharing, material quid pro quo can keep autocrats' business allies loyal; the effect runs partly through state control of the media."
  abstract: >
    Why do business allies (not) defect from authoritarian regimes? An emerging scholarship
    shows that connected businesses face high political risk, and the autocrat can
    financially pressure business allies during economic crises. And yet, despite their
    disruptive power, the business elite rarely switch to opposition. I argue that this
    unexpected loyalty does not always stem from credible power-sharing. The more material
    quid pro quo the business elite engage in with the dictator, the less they can credibly
    threaten the dictator with defection. I present a bargaining game between the
    dictatorship and its business allies and test it using a country-year-level dataset of
    76 countries for 1992–2019. The results indicate that higher degrees of patrimonial
    co-optation lower the risk of business opposition. This effect is partly mediated
    through the government’s control over the media landscape. These findings suggest that
    even informal, non-institutional tools of co-optation can effectively deter defection.
  links:
    - label: "Replication"
      url: "https://github.com/semuhi/business-opposition"

- id: 3
  year: 2025
  month: 7
  title: "Can capitalism save democracy?"
  venue: "Journal of Democracy 36(3)"
  type: "academic-peer-review"
  portfolio: ["business"]
  tags: ["defection"]
  methods: ["qual"]
  dataset: false
  featured: true
  coauthors: "Way & Levitsky"
  coauthors_full: "Lucan Way & Steven Levitsky"
  project: "demcor"
  url: "https://muse.jhu.edu/pub/1/article/964562"
  blurb: "A strong, autonomous private sector underwrites democratic resilience; state capture of business is the more direct threat."
  abstract: >
    While capitalism today is widely seen as a threat to democracy, the free market plays a
    central role in fostering pluralism. A strong and autonomous private sector is critical
    to the creation of a robust opposition and an independent civil society that are central
    to democratic resilience. At the same time, even rich and powerful private sectors in
    high-income countries may be vulnerable to government pressure with regulatory
    coercion—a fact that makes these countries potentially susceptible to democratic
    backsliding. Indeed, state capture of business—to a greater degree than business capture
    of the state— represents the most direct threat to democratic survival.
  links:
    - label: "Video"
      url: "https://www.youtube.com/watch?v=KhGGoWOtpTE"
    - label: "Podcast"
      url: "https://revdem.ceu.edu/2025/09/11/capitalisms-democracy/"

- id: 4
  year: 2024
  title: "Out of sight, out of mind: lockdown measures and sentiment toward refugees"
  venue: "J. Information Technology & Politics 21(2)"
  type: "academic-peer-review"
  portfolio: ["conflict", "datahub"]
  shelf: "methods"
  tags: ["turkey"]
  methods: ["text"]
  dataset: false
  featured: true
  coauthors: "Reda & Aboussalah"
  coauthors_full: "Amir Abdul Reda & Amine Mohamed Aboussalah"
  url: "https://www.tandfonline.com/doi/full/10.1080/19331681.2023.2183301"
  blurb: "Lockdown mobility restrictions and shifting sentiment toward refugees in Turkey, measured from Twitter."
  abstract: >
    How did COVID-19 related movement restrictions impact sentiment toward refugees?
    Existing theories offer conflicting answers. On the one hand, contact theories suggest
    that movement restrictions might reduce casual interactions with refugees, leading to
    less negative sentiments. On the other hand, integrated threat theories suggest refugees
    may be perceived as a security threat and blamed for these movement restrictions in the
    first place. To gauge the effect of movement restrictions, we investigate the effect of
    physical isolation on sentiments toward refugees in Turkey by using a novel dataset. We
    use Google Mobility Reports’ measurements of movement and our measures of sentiments
    toward refugees using refugee-related tweets from Turkey. Statistical analysis shows
    that xenophobic sentiment generally decreased during the pandemic. Our study shows that
    different types of reduced mobility correlate with increased sympathy toward refugees:
    the more people stay at home, the more positive sentiments toward refugees they exhibit
    on Twitter. We conclude by proposing two possible causal mechanisms for these findings.
    The findings suggest that the absence of casual contact with refugees may yield less
    negative sentiment, and/or that a rally around the flag mechanism yields unprecedented
    levels of social solidarity in response to the pandemic.

- id: 5
  year: 2024
  title: "Mobilizing the masses: measuring resource mobilization on Twitter"
  venue: "Sociological Methods & Research 53(1)"
  type: "academic-peer-review"
  portfolio: ["datahub"]
  shelf: "methods"
  tags: []
  methods: ["text"]
  dataset: true
  featured: false
  coauthors: "Reda & Abdalla"
  coauthors_full: "Amir Abdul Reda & Mohamed Abdalla"
  related_project: "maidan"
  url: "https://journals.sagepub.com/doi/10.1177/0049124120986197"
  blurb: "A four-conditional lexicon to measure social movements' resource-mobilization efforts on Twitter in real time."
  abstract: >
    How can we measure the resource mobilization (RM) efforts of social movements on
    Twitter? In this article, we create the first-ever measure of social movements’ RM
    efforts on a social media platform. To this aim, we create a four-conditional lexicon
    that can parse through tweets and identify those concerned with RM. We also create a
    simple RM score that can be plotted in a time series format to track the RM efforts of
    social movements in real-time. We use our tools with millions of tweets from the United
    States streamed between November 28, 2018, and February 11, 2019, to demonstrate how our
    measure can help us estimate the saliency and persistency of social movements’ RM
    efforts. We find that our measure captures RM by successfully cross-checking the
    variation of this score against protest events in the United States during the same time
    frame. Finally, we illustrate the descriptive and qualitative utility of our tools for
    understanding social movements by running conventional topic modeling algorithms on the
    tweets that were used to compute the RM score and point at specific avenues for theory
    building and testing.
  presentations:
    - {label: "APSA 2019 (DC)", url: "https://connect.apsanet.org/apsa2019/timeline-2/"}

- id: 6
  year: 2022
  month: 7
  title: "Containing ethnic conflict: repression, cooptation, and identity politics"
  venue: "Comparative Politics 54(4)"
  type: "academic-peer-review"
  portfolio: ["conflict", "datahub"]
  shelf: "datasets"
  tags: ["turkey", "polarization", "defection"]
  methods: ["largen", "qual"]
  dataset: true
  featured: true
  coauthors: "Belge"
  coauthors_full: "Ceren Belge"
  url: "https://www.ingentaconnect.com/content/cuny/cp/2022/00000054/00000004/art00009"
  related:
    - {id: 17, rel: "related defection study"}
  blurb: "How the Turkish state calibrated repression and co-optation toward Kurds by identity policy during the 1990s counterinsurgency, with an original tribe dataset."
  abstract: >
    Why do states target some civilians with collective punishment while coopting others
    with material goods during an ethnic civil war? This article examines how the Turkish
    government calibrated its repression and cooptation policies towards the Kurdish
    population during the counterinsurgency of the 1990s. In contrast to the situational
    conflict dynamics emphasized by the civil war literature, we explain the distribution of
    cooptation and repression with the state's identity policy: government policies were
    more punitive in areas that displayed strong Kurdish linguistic/political identity, or
    high tribal concentration, while they were more cooptative where the government had
    fostered a Sunni-Muslim Kurdish identity. The study is based on a novel dataset that
    includes information about displacement, tribal concentration, and violent events from
    archival sources.
  presentations:
    - {label: "ISA 2019 (Toronto)", url: "https://www.isanet.org/Conferences/Toronto-2019"}
  links:
    - label: "Replication"
      url: "https://github.com/semuhi/cp-ethnic-conflict"

- id: 7
  year: 2025
  month: 8
  title: "Cross-partisan disaster relief aid as opposition depolarization tactic"
  venue: "Working paper"
  type: "academic-working-paper"
  portfolio: ["propaganda", "durability"]
  tags: ["turkey", "polarization"]
  methods: ["exp"]
  dataset: false
  featured: false
  coauthors: "Donnelly"
  coauthors_full: "Michael Donnelly"
  project: "depol-toolkit"
  url: "https://www.researchgate.net/publication/392093494_Climate_disasters_and_polarization_under_authoritarianism_Could_cross-partisan_outreach_help"
  blurb: "Conventional depolarization tools may have unintended and divergent consequences."
  abstract: >
    Can opposition parties help depolarize with cross-partisan post-disaster solidarity
    under authoritarian regimes? The increasingly frequent climate disasters like wildfires
    and floods may exacerbate polarization through a partisan distribution of resources, and
    autocrats may take advantage of these disasters to consolidate their support base and
    discredit the opposition. In response, opposition parties may deploy cross-partisan
    disaster relief aid as a depolarization strategy. We test the effectiveness of such
    relief aid by Turkey's main opposition, using a well-powered in-person survey
    experiment. Turkey, an electoral autocracy with intense polarization, government
    propaganda, and ethnic conflict, presents a hard test case. Our findings reveal that
    costly public acts may increase political tolerance toward the opposition, despite
    government propaganda. However, it backfires in terms of affective polarization, leading
    to perceptions of hypocrisy not just among pro-government voters but also among ethnic
    minorities in opposition. These results suggest that conventional depolarization tools
    may have unintended and divergent consequences, with significant implications for
    opposition strategies against autocrats.
  presentations:
    - {label: "APSA 2022 (Montreal)", url: "https://connect.apsanet.org/apsa2022/online-program/"}
    - {label: "CEU DRD Annual Workshop 2024 (Budapest)", url: "https://democracyinstitute.ceu.edu/ceu-di-annual-conference-democracy-and-development"}
  grants:
    - {label: "EGAP Priority Theme Small Grants", url: "https://egap.org"}
    - {label: "POMEPS Travel, Research, Engagement Grant", url: "https://pomeps.org"}

- id: 8
  year: 2025
  month: 9
  title: "Why citizens endorse authoritarian financial repression?"
  venue: "Working paper"
  type: "academic-working-paper"
  portfolio: ["business"]
  tags: ["turkey", "polarization"]
  methods: ["exp"]
  dataset: false
  featured: true
  url: "https://www.researchgate.net/publication/392121612_Why_Citizens_Endorse_Authoritarian_Financial_Repression"
  related:
    - {id: 1, rel: "grows out of the dissertation"}
  blurb: "An autocrat's business allies may be politically expedient targets; visual conjoints in Turkey."
  abstract: >
    Why do citizens endorse financial repression in autocracies? An autocrat may financially
    squeeze the business community, especially during economic downturns. However, such
    extraordinary taxation may lack broad public support and trigger backlash. I designed
    novel visual conjoints using AI-generated LinkedIn profiles of businesspeople and
    measured public support for their repression in Turkey, varying cues of co-optation, and
    firm’s characteristics. The results indicate that people are more likely to condone the
    extra-taxation of co-opted business elite perceived as rent seekers responsible for the
    crisis, suggesting that an autocrat’s business allies may be politically expedient
    targets. I then discuss the findings’ external validity with illustrative cases from
    different types of autocratic regimes. This article contributes to growing scholarships
    on public support for taxing the rich, authoritarian repression, and the cost of
    political-connectedness.
  presentations:
    - {label: "APSA 2023 (LA)", url: "https://www.apsanet.org/Portals/54/annualmeeting/APSA_2023_Annual%20Meeting_Program_2_.pdf?ver=fRsI8tmLMPmm0AWXxqoqKA%3D%3D"}
  grants:
    - {label: "IHS Hayek Fund", url: "https://theihs.org/faculty-research-grants"}

- id: 9
  year: 2025
  month: 5
  title: "The cost of co-optation: tax audit as authoritarian financial repression"
  venue: "Working paper"
  type: "academic-working-paper"
  portfolio: ["business"]
  tags: ["defection"]
  methods: ["largen"]
  dataset: false
  featured: true
  url: "https://www.researchgate.net/publication/392093558_The_Cost_of_Co-optation_Tax_Audit_as_Authoritarian_Financial_Repression"
  related:
    - {id: 1, rel: "grows out of the dissertation"}
  blurb: "Tax audits as a low-intensity tool of financial repression against co-opted business allies; firm-level evidence from 32,000 firms in 40 electoral autocracies."
  abstract: >
    How do autocrats manage debt crises? While extorting businesses may offer a quick
    windfall, such coercion may prove costly for autocrats. I argue that during fiscal
    downturns, autocrats financially target their business allies to reduce the spoils
    offered to cronies. To mitigate risk exposure, they deploy tax audits as a technical
    tool of repression. I qualitatively illustrate this with cases from different
    autocracies and test it using firm-level data from over 32,000 companies in 40
    electoral autocracies. Using various estimators, sensitivity analyses, and placebo
    tests, I show that co-opted firms with public contracts or import permits are more
    likely to be inspected by the tax authorities, and more frequently during debt
    crises. The effects are pronounced for regimes without strong propaganda
    capabilities, suggesting a substitution effect between propaganda and repression.
    The results have implications for understanding the cost of co-optation under
    autocracies and regime durability during economic crises.

- id: 10
  year: 2025
  month: 9
  title: "Strategic humanitarian aid, trust in Europe, and support for authoritarianism"
  venue: "IDOS Discussion paper"
  type: "academic-discussion-paper"
  portfolio: ["propaganda", "durability"]
  tags: ["dev-cooperation", "turkey", "europe", "polarization"]
  methods: ["exp"]
  dataset: false
  featured: true
  url: "https://doi.org/10.23661/idp28.2025"
  blurb: "Strategic framing of humanitarian aid, communicated as such, increases trust in European organizations, partly by reducing conspiracism."
  abstract: >
    How does international assistance impact public attitudes towards donors in the
    recipient country when tied to strategic interests? European leaders highlight more and
    more the strategic and transactional nature of international assistance. Yet, we still
    do not know much about how such shifts in framing of international assistance are
    perceived by the recipient public, especially in contexts with prevalent anti-Western
    attitudes and propaganda that dismisses aid as hypocritical and disingenuous. I
    conducted an online survey experiment in Turkey to assess the attitudinal and
    quasi-behavioral effects of different types of international assistance post-disaster --
    conditional, unconditional, and strategic -- and whether they help sway public attitudes
    in the face of authoritarian propaganda. Contrary to my expectations, strategic aid
    decreased trust in the government as a defender of national interest among conservative,
    nationalist, and Eurosceptic regime supporters, and also increased trust in European
    organizations. It did so partly by mitigating conspiracism and evoking positive emotions
    among pro-government voters whose views are hard to change. However, this comes at a
    cost: increased trade skepticism and less engagement with foreign media outlets among
    regime opponents. The findings have significant implications for international
    assistance strategies for increasing European soft power and their unintended
    consequences.
  presentations:
    - {label: "MPSA 2025 (Chicago)", url: "https://convention2.allacademic.com/one/mpsa/mpsa25/"}
    - {label: "ECPR Joint Workshop 2025 (Prague)", url: "https://ecpr.eu/Events/274"}
    - {label: "SISP Workshop 2025 (Milan)", url: "https://standinggroups.sisp.it/politicalregimes/2025/02/04/call-for-papers-workshop-political-regimes-and-their-search-for-legitimacy-6-june-milan/"}
    - {label: "Chicago Center on Democracy 2026", url: "https://events.uchicago.edu/event/international-dynamics"}
    - {label: "PEDD 2026 (Münster)", url: "https://www.wiwi.uni-muenster.de/loep/en/pedd-2026"}

- id: 11
  year: 2025
  month: 11
  title: "Sultanist and militarist soft propaganda, and support for security operations"
  venue: "Working paper"
  type: "academic-working-paper"
  portfolio: ["propaganda"]
  tags: ["turkey"]
  methods: ["exp", "text"]
  dataset: false
  featured: true
  coauthors: "Donnelly"
  coauthors_full: "Michael Donnelly"
  url: "https://www.researchgate.net/publication/392093393_Sultanist_and_Militarist_Soft_Propaganda_and_Support_for_Security_Operations"
  blurb: "How sultanist and militarist soft propaganda on state-funded TV shifts support for security operations at home and abroad."
  abstract: >
    How does autocratic soft propaganda impact support for security operations at home and
    abroad? Autocratic regimes allocate significant resources for TV series and movies to
    manufacture public support and boost nationalism. Despite the growing scholarship, we
    still do not know enough about the effectiveness of soft propaganda. To that end, first,
    we scraped transcript data from 1,201 episodes across fourteen Turkish government-
    sponsored TV series over a decade (2014-2026) and 410 instrumental soundtracks data. The
    findings reveal a sophisticated, differentiated propaganda ecosystem where each series
    serves a distinct ideological function, evokes varying emotions, and closely correlates
    with contemporary events. Second, we conducted an in-person experiment in Turkey to
    measure the effects of government-funded militarist and imperial/neo-
    Ottomanist/sultanist TV series on support for cross-border military operations and
    domestic police operations. The findings suggest that we should take fiction seriously:
    imperial/neo-Ottomanist/sultanist TV series significantly increase support for scaling
    up security operations abroad among religious pro-regime voters, while militarist
    scripts drive similar attitudes among nationalists. Both scripts fuel anti-Israel
    sentiments among government supporters. The results show that autocrats cater soft
    propaganda to different ideological groups within their support base and to varying
    degrees of effectiveness.
  presentations:
    - {label: "VWAR Workshop 2024", url: "https://authoritarianregimes.net"}
    - {label: "PEDD 2025 (Münster)", url: "https://www.wiwi.uni-muenster.de/loep/de/node/231"}
    - {label: "PSA 2025 (Birmingham)", url: "https://www.psa.ac.uk/sites/default/files/Final%20PSA25%20Programme.pdf"}
    - {label: "PEBG Seminar 2026 (Toronto)", url: "https://www.politics.utoronto.ca/"}
    - {label: "APSG Conference 2026 (London)", url: "https://apsg.work/4th-summer-conference/"}

- id: 12
  year: 2025
  month: 12
  title: "E-government tools, authoritarian propaganda, and regime support"
  venue: "IDOS Discussion paper"
  type: "academic-discussion-paper"
  portfolio: ["propaganda", "aitech", "durability"]
  tags: ["turkey", "polarization"]
  methods: ["exp"]
  dataset: false
  featured: true
  coauthors: "von Schiller"
  coauthors_full: "Armin von Schiller"
  url: "https://doi.org/10.23661/idp35.2025"
  blurb: "Efficiency-enhancing GovTech tools, when paired with sophisticated regime communication, can durably entrench autocratic rule."
  abstract: >
    How do e-government tools that enable direct online communication with the executive
    affect citizens’ support for autocracy? On the one hand, such centralised digital
    government tools may sway public opinion in favour of strongman rule at the expense of
    autocratic institutions; on the other hand, such participation and responsiveness may
    unintentionally unveil a wide range of issues in the country, undermining trust in the
    regime. We examine an electronic platform in Turkey, CIMER, that allows citizens to
    submit petitions and complaints, send messages to the president, and propose policies
    and programmes. We conducted a well-powered online survey experiment with a nationally
    representative sample (N≈4,600) that estimates the effects of different types of regime
    propaganda around this e-portal on attitudinal and quasi-behavioural outcomes. The
    results suggest that propaganda through CIMER improves diffuse support for the regime
    and generates behavioural compliance, even among opposition voters. However, these
    positive effects accrue to regime institutions rather than to Erdoğan personally as the
    executive’s personalistic leader. On certain dimensions, the propaganda backfires among
    the regime’s core support groups, eroding their perceptions of Erdoğan’s popularity as a
    leader. These results have major implications for the expected downstream effects of
    these types of digital tools on regime stability and legitimacy, and they add to the
    growing warnings about holding overly optimistic views concerning the effects of
    digitalisation on democracy.
  presentations:
    - {label: "EPSA 2025 (Madrid)", url: "https://coms.events/epsa2025/index.html"}
    - {label: "WZB-MoPED Workshop 2025 (Berlin)", url: "https://www.wzb.eu/en/events/moped-workshop-0"}
    - {label: "EIPCC Workshop 2025 (Bonn)", url: "https://www.uni-erfurt.de/universitaet/aktuelles/news/news-detail/inter-institutional-research-workshop-retreat-2025-brings-four-major-institutions-together-in-bonn"}
    - {label: "ECPR Joint Sessions 2026 (Innsbruck)", url: "https://ecpr.eu/JointSessions"}

- id: 13
  year: 2025
  month: 7
  title: "Domestic leader prosecutions: PROSEC Dataset v1.0"
  venue: "Working paper"
  type: "academic-working-paper"
  portfolio: ["datahub", "durability"]
  shelf: "datasets"
  tags: ["polarization"]
  methods: ["largen"]
  dataset: true
  featured: true
  coauthors: "Gunitsky & Jafarov"
  coauthors_full: "Seva Gunitsky & Sahib Jafarov"
  url: "https://www.researchgate.net/publication/393329518_Introducing_the_PROSEC_Dataset_v10"
  blurb: "A global dataset of domestic leader prosecutions in hybrid and democratic regimes, 1989 to 2023."
  abstract: >
    Does the prosecution of former leaders by their own states strengthen or undermine
    democracy? Supporters of leader prosecutions emphasize their effects on accountability,
    transparency, and legal equality, while critics warn of elite vendettas, public
    disillusionment, and deepening polarization. Yet this debate has so far rested largely
    on normative or ideological claims rather than systematic evidence. To address this gap,
    this research note introduces the first comprehensive global dataset of leader
    prosecutions in hybrid and democratic regimes from 1989 to 2023. We find that the
    practice is surprisingly common -- over a quarter of all non-autocratic leaders have
    been prosecuted by their own governments during this period. We find no evidence that
    poorer or less institutionally capable countries are more likely to prosecute, and
    little evidence that prosecutions are followed by cycles of political retribution. We
    also find evidence of regional contagion, especially in recent years. These findings,
    while suggestive, challenge the idea that prosecutions are markers of democratic
    decline, instead highlighting legal capacity and political context as crucial factors in
    the decision to prosecute.

- id: 14
  year: 2025
  month: 7
  title: "Resource concentration and autocratic resilience"
  venue: "Working paper"
  type: "academic-working-paper"
  # primary home moved business -> datahub 2026-07-20 (user decision): the RC index
  # anchors the Data and Methods page; still cross-listed in business + propaganda.
  portfolio: ["datahub", "business", "propaganda"]
  shelf: "datasets"
  tags: ["defection"]
  methods: ["largen"]
  dataset: true
  featured: true
  # red dashed map edge to the Autocracy Data Hub ring (user decision 2026-07-20)
  related_project: "datahub"
  coauthors: "Way & Levitsky"
  coauthors_full: "Lucan Way & Steven Levitsky"
  url: "https://www.researchgate.net/publication/393329308_Resource_Concentration_and_Autocratic_Resilience"
  blurb: "An original index of statist resource concentration and its effect on autocratic survival, 1970 to 2023."
  abstract: >
    How does resource concentration impact regime survival? On the one hand, the
    concentration of resources in government hands may allow dictators to weaken independent
    economic actors, bind large numbers to the state through the provision of attractive
    public employment, and facilitate efforts to impoverish, coopt, or divide organized
    opposition. On the other hand, high-level state involvement in the economy may render
    autocrats liable for a country’s economic woes and aggravate the economic loss of the
    incumbent elite during economic downturns, leading to higher rates of defection. To test
    these ideas, we created an original index of resource concentration that includes a
    variety of measures for the relative size of the government/private sector, state’s
    coercive control over the economy, and poverty and underdevelopment with a
    country-year-level dataset from 1970-2023. We show that higher levels of statist
    resource concentration significantly boost regime survival, controlled for the level of
    institutionalization. The findings have significant implications for understanding
    structural/political economy factors behind regime durability.
  presentations:
    - {label: "PSA 2026 (Oxford)", url: "https://www.psa.ac.uk/conference/psa26-annual-conference/"}
    - {label: "EPSS 2026 (Belfast)", url: "https://epssnet.org/belfast-2026/"}

- id: 15
  year: 2025
  month: 10
  title: "Tracking autocratization transparently: an event-level dataset (DERTT)"
  venue: "Working paper"
  type: "academic-working-paper"
  portfolio: ["datahub"]
  shelf: "datasets"
  tags: []
  methods: ["text", "largen"]
  dataset: true
  featured: true
  coauthors: "Way, Levitsky & Talebirad"
  coauthors_full: "Lucan Way, Steven Levitsky & Yashar Talebirad"
  project: "datahub"
  url: "https://www.researchgate.net/publication/400025334_Tracking_Democratic_Erosion_Transparently_and_Reproducibly_An_Event-Level_Dataset"
  blurb: "An LLM-extracted, reproducible event-level dataset of democratic erosion: 76,792 unique incidents across 197 countries, 2000 to 2023."
  abstract: >
    We present a framework for extracting structured autocratization events from human
    rights reports using keyword filtering and LLM-based extraction. The pipeline processes
    9,677 country-year reports from the U.S. State Department, Freedom House, and Amnesty
    International (2000-2023) using an open-weight model with conservative, precision-first
    prompts and a two-threshold semantic deduplication layer. Applied at scale, it produces
    DERTT, a dataset of 76,792 unique autocratization incidents across 197 countries and 6
    event types, each traceable to specific sentences in the source reports.
