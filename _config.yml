title: "Dr. Semuhi Sinanoglu"
author: "Dr. Semuhi Sinanoglu"
permalink: /:title/
lang: "en"

# The Constellation system (spec v3) renders everything: layout _layouts/constellation.html,
# data in _data/, styles in _sass/constellation/. The old Bulma theme files
# (_layouts/default|page|post, _includes/menu.html etc., _sass/*.sass) are retired and
# no page references them; navigation/external config for that theme was removed with it.

plugins:
 - jekyll-feed
 - jekyll-sitemap

exclude:
 - worklog.html           # internal work log, not for publication
 - _design/
 - assets/katex/README.md # no front matter: Pages' forced plugins (optional-front-matter
                          # + default-layout) would page-ify it through the retired
                          # default layout and break the build
