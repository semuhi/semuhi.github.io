# The Constellation system (spec v3) renders everything: layout _layouts/constellation.html,
# data in _data/, styles in _sass/constellation/. The old Bulma theme (layouts, includes,
# top-level _sass files, vendored KaTeX/jQuery) was deleted 2026-07-20 after the security
# audit confirmed nothing referenced it.

plugins:
 - jekyll-feed
 - jekyll-sitemap

exclude:
 - worklog.html           # internal work log, not for publication
 - _design/
