- id: 31
  year: 2025
  month: 3
  title: "Standing up for Istanbul's mayor will strengthen European security"
  venue: "Global Policy"
  type: "oped"
  portfolio: ["durability", "conflict"]
  tags: ["turkey", "europe"]
  dataset: false
  featured: false
  url: "https://www.globalpolicyjournal.com/blog/27/03/2025/standing-istanbuls-mayor-will-strengthen-european-security"
  blurb: "Europe jeopardizes its own future security, trading a pro-democracy partner for a full-blown autocratic regime."
  abstract: >
    European naming-and-shaming and other forms of democracy support have been largely
    ineffective, or worse, counterproductive in Turkey. My research shows that the regime frames
    such efforts as foreign meddling, weaponizing them to fuel nationalist sentiments. Against
    the backdrop of heavy propaganda and deep partisan polarization, international solidarity
    with the opposition has had unintended consequences: consolidating the government's
    electoral base, eroding trust in Western institutions, and feeding conspiratorial
    narratives. Scattered and one-off messages of support carry little weight in the Turkish
    context; they come across as empty words and are, at best, ineffective. European democracy
    support can only be effective through clear, coordinated, and consistent messaging. European
    institutions should collectively mobilize to express solidarity with the pro-democracy
    opposition to rebuild public trust, especially among the younger generations, while ensuring
    these messages are carefully calibrated not to alienate or antagonize the regime's
    conservative support base. Still, messaging alone is not enough. The European response must
    include concrete actions that go beyond rhetoric.

- id: 32
  year: 2024
  month: 9
  title: "Countering information pollution to protect democracy"
  venue: "IDOS Policy Brief 29/2024"
  kicker: "IDOS Policy brief"
  type: "policy-brief"
  portfolio: ["propaganda", "aitech", "business"]
  tags: []
  dataset: false
  featured: false
  coauthors: "Breuer"
  coauthors_full: "Anita Breuer"
  url: "https://www.idos-research.de/policy-brief/article/countering-information-pollution-to-protect-democracy/"
  blurb: "Instead of narrowly focusing on politically controversial content moderation, content-neutral intervention tools should receive more attention."
  abstract: >
    The increasing sophistication and accessibility of artificial intelligence (AI),
    including the generation of deep fakes, exacerbates the challenges of information
    pollution by making it harder
    to discern truth from falsehood, thus manipulating public perception. This policy brief
    presents international initiatives and critically discusses the tools available to
    combat information pollution. The focus of approaches to counter information pollution
    needs to be broadened. Instead of narrowly focusing on politically controversial content
    moderation, content-neutral intervention tools should receive more attention, and the
    potential of AI tools to scale up these interventions should be considered. Policy-
    makers and advisors need to be mindful of context sensitivity. There is no one-size-
    fits-all solution, and effective tools in some contexts may backfire in others.

