  - date: 2026-06-24
    platform: linkedin
    type: talk
    url: "https://www.linkedin.com/posts/semuhisinanoglu_fimi-ai-gmf2026-activity-7475539588481167360-XFcN"
    excerpt: "#FIMI operations' effectiveness has so far been an open empirical question, with evidence suggesting their impact might be more limited than initially assumed. That's about to change with malicious #AI swarms. These are AI agents with persistent identities and memory that would come across as a real, diverse crowd of people, and could self-coordinate and infiltrate online communities. The risk is real and imminent. To discuss the effects of AI swarms on electoral integrity, we convened a panel for the DW Global Media Forum #GMF2026, which took place this year at the World Conference Center Bonn."
    portfolio: [propaganda]
    image: /assets/img/post2-gmf26.jpeg

  - date: 2026-06-23
    platform: linkedin
    type: talk
    url: "https://www.linkedin.com/posts/semuhisinanoglu_belfast-epss2026-autocratic-activity-7475166936218337280-uOYE"
    excerpt: "Last week, I was in #Belfast for the #EPSS2026. I presented our ongoing work with Lucan Way and Steve Levitsky on how resource concentration leads to autocratic durability. We show that there is one common thread across durable #autocratic regimes that are quite diverse in institutions, wealth, and culture: whether resources are concentrated in the hands of the state. When they are, it is difficult for the #opposition to mount an independent challenge against the regime, and easier for the government to divide, demobilize, and co-opt the opposition."
    portfolio: [business]
    image: /assets/img/post3-belfast.jpeg

  - date: 2026-06-22
    platform: linkedin
    type: talk
    url: "https://www.linkedin.com/posts/semuhisinanoglu_fiction-experimental-security-activity-7474816009082961920-yG8K"
    excerpt: "State-sponsored fiction is politically consequential. We should take it seriously. Last week, I was at Queen Mary University of London for the APSG conference, where I presented joint work with Michael Donnelly on how authoritarian state-sponsored fiction shapes public support for security operations abroad. Authoritarian governments invest more and more in producing and controlling entertainment content. It is a deliberate instrument of influence."
    portfolio: [propaganda]
    image: /assets/img/post4-qmul.jpeg

