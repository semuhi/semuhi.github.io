aitech:
  - title: A tech upgrade for development cooperation
    desc: >
      The sector can no longer rely on outdated static PDFs for its advisory and
      programming work. But more than plug-in efficiency tools, the technological
      disruption requires a complete rethinking of how the sector operates and
      offers democracy support.
    ids: [21, 29, 30, 37]
