    url: "https://www.linkedin.com/posts/semuhisinanoglu_why-democracy-needs-business-a-strong-and-ugcPost-7346486121909932033-ZFpu"
    excerpt: "Why democracy needs business? A strong and autonomous private sector is critical to the creation of a robust opposition and an independent civil society that are central to democratic resilience. But there are risks! Even in rich, well-established democracies, governments have strong discretionary powers to help allies and punish rivals. That is why it is not business capture of the state but rather state capture of business that poses the greatest danger to democracy, we argue in our recent piece in the Journal of Democracy with Lucan Way and Steve Levitsky."
